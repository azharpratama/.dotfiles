# --- Options ------------------------------------------------------------------
unbind r
bind r source-file ~/.tmux.conf

set -g mouse on
set -g default-terminal "tmux-256color"
set -g status-position top

set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

setw -g mode-keys vi

run "tmux set-environment -g UTC_OFFSET $(date +%z | sed 's/00$//; s/+0/+/; s/-0/-/')"

# --- TPM Bootstrap ------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# --- Plugins ------------------------------------------------------------------
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin 'catppuccin/tmux#v2.1.3'

# --- Catppuccin Settings ------------------------------------------------------
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# --- Left Status Bar ----------------------------------------------------------
set -g status-left-length 100
set -g status-left ""

# Session Name
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_surface_0}]  #S },#{#[bg=default,fg=#{@thm_green},bold]  #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"

# Current Command
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"

# Current Path
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# Zoom Indicator
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# --- Right Status Bar ---------------------------------------------------------
set -g status-right-length 100
set -g status-right ""

# Date & Time
set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M"

# --- Window Status Bar --------------------------------------------------------
set -wg automatic-rename on
set -g automatic-rename-format "Window"
set -g status-justify "absolute-centre"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_rosewater}"

set -g window-status-last-style "bg=default,fg=#{@thm_peach}"

set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_surface_0}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_surface_0}"

set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0},none]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_surface_1}"

# --- Pane Border Styles -------------------------------------------------------
# setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_lavender}"

# --- TPM & Final Touches ------------------------------------------------------
run ~/.tmux/plugins/tpm/tpm

# Transparency fix (must be at the very bottom)
set -g status-bg default
set -g status-style bg=default
setw -g pane-border-style "bg=default,fg=#{@thm_surface_0}"

